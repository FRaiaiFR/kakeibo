<style>
:root{
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#993556;
  --green:#1D9E75;--red:#E24B4A;
  --bg:#FAF8F6;--surface:#FFFFFF;--surface2:#F2EFEC;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#1C1917;--text2:#78716C;--text3:#A8A29E;
  --radius:14px;--rsm:8px;
}
html.dark{
  --pink:#F08AB0;--pink-l:#2D1520;--pink-d:#F5B8CD;
  --green:#3DD68C;--red:#F07070;
  --bg:#0D0D0F;--surface:#17171A;--surface2:#202025;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#ECEAE6;--text2:#8A8480;--text3:#4A4845;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
input,textarea{user-select:text;-webkit-user-select:text}
html{height:100%;overflow:hidden;transition:background .35s,color .35s}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:100vw;transition:background .35s,color .35s}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch;padding-bottom:48px}
/* 夕暮れテーマ */
html.sunset{
  --pink:#E8714A;--pink-l:#FDF0EA;--pink-d:#C44E28;
  --green:#2E9E6A;--red:#D94040;
  --bg:#FDF4EC;--surface:#FFFFFF;--surface2:#FAF0E6;
  --border:rgba(180,100,40,0.1);--border2:rgba(180,100,40,0.18);
  --text:#2C1A0E;--text2:#8C6040;--text3:#C4A080;
}
html.dark.sunset{
  --pink:#F0835A;--pink-l:#2D1A10;--pink-d:#F5A882;
  --bg:#120D08;--surface:#1E1408;--surface2:#281C10;
}
/* AUTOボタン */
.auto-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .3s;letter-spacing:.5px}
.auto-btn.on{background:linear-gradient(135deg,#F59E0B,#EC4899);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(236,72,153,.3)}
/* AIボタン */
.ai-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s}
.ai-btn:hover{background:var(--pink-l);border-color:var(--pink);color:var(--pink)}
/* AI分析パネル */
.ai-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s}
.ai-overlay.open{background:rgba(0,0,0,0.5);pointer-events:all}
.ai-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:22px 22px 0 0;padding:0 0 32px;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);box-shadow:0 -4px 32px rgba(0,0,0,.2)}
.ai-panel.open{transform:translateY(0)}
.ai-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.ai-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-close{background:var(--surface2);border:none;cursor:pointer;padding:5px 12px;border-radius:20px;font-size:12px;color:var(--text2);font-weight:600}
.ai-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.ai-card{background:var(--surface2);border-radius:12px;padding:14px 16px}
.ai-card-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.ai-card-value{font-size:20px;font-weight:800;color:var(--text)}
.ai-card-sub{font-size:12px;color:var(--text2);margin-top:4px}
.ai-insight{background:var(--pink-l);border-radius:12px;padding:14px 16px;border-left:3px solid var(--pink)}
.ai-insight-text{font-size:13px;color:var(--text);line-height:1.7}
/* テーマ時刻バッジ */
.time-badge{font-size:10px;color:var(--text3);margin-top:2px;text-align:center}
.theme-toggle{position:relative;display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:999px;padding:3px;cursor:pointer;transition:background .35s,border-color .35s;flex-shrink:0}
.theme-toggle-knob{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .35s cubic-bezier(.34,1.56,.64,1),background .35s;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.15);position:relative;z-index:1}
html.dark .theme-toggle-knob{transform:translateX(28px)}
.theme-toggle-track{position:absolute;left:3px;right:3px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;font-size:12px;padding:0 3px}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 18px 0;flex-shrink:0;z-index:100;transition:background .35s,border-color .35s}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-left{display:flex;flex-direction:column}
.header-right{display:flex;align-items:center;gap:8px}
.app-title{font-size:18px;font-weight:700}
.app-year{font-size:12px;color:var(--text2)}
.sync-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:#F59E0B;animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px;margin-bottom:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab.active{color:var(--pink);border-bottom-color:var(--pink)}
/* Graph page */
.page{padding:14px 14px 0}
.page-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px}
.chart-wrap{width:100%;overflow:hidden}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--text2);width:26px;flex-shrink:0;text-align:right}
.bar-bg{flex:1;background:var(--surface2);border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{font-size:11px;color:var(--text2);width:60px;flex-shrink:0;text-align:right}
.pie-wrap{display:flex;align-items:center;gap:16px}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.pie-leg-row{display:flex;align-items:center;gap:7px;font-size:12px}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Annual page */
.annual-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.annual-row:last-child{border-bottom:none}
.annual-month{font-size:13px;font-weight:600;color:var(--text)}
.annual-vals{display:flex;gap:14px}
.annual-val{font-size:12px;text-align:right}

@keyframes spin{to{transform:rotate(360deg)}}

.toast.show{transform:translateX(-50%) translateY(0)}

<body>
<div class="app-header">
  <div class="header-top">

    <div class="sum-card"><div class="sum-label">入金合計</div><div class="sum-value income" id="sum-inc">¥0</div></div>
    <div class="sum-card"><div class="sum-label">出費合計</div><div class="sum-value expense" id="sum-exp">¥0</div></div>
    <div class="sum-card"><div class="sum-label">残高</div><div class="sum-value" id="sum-bal">¥0</div></div>

      <div class="ai-title">🤖 AI支出分析</div>
      <button class="ai-close" onclick="closeAI()">閉じる</button>
    </div>
    <div class="ai-body" id="ai-body"></div>
  </div>

<script>
const DB_URL='https://kanekannri-default-rtdb.asia-southeast1.firebasedatabase.app';
const ROOM_ID='a';
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOWS=['日','月','火','水','木','金','土'];
let entries=[],selMonth=new Date().getMonth(),selYear=new Date().getFullYear(),selDay=null,editId=null,formType='expense';
let receiptItems=[],receiptImgUrl='',ocrRunning=false;
const fmt=n=>Math.round(n).toLocaleString('ja-JP');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

// Firebase
const dbPath=()=>`${DB_URL}/rooms/${ROOM_ID}/entries.json`;
const ep=id=>`${DB_URL}/rooms/${ROOM_ID}/entries/${id}.json`;
function setSS(s){document.getElementById('sync-dot').className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('sync-label').textContent=s==='syncing'?'同期中':s==='error'?'エラー':'同期済み';}
async function fetchEntries(){setSS('syncing');try{const r=await fetch(dbPath());const d=await r.json();entries=d?Object.values(d):[];setSS('ok');}catch{setSS('error');}}
async function pushEntry(e){try{await fetch(ep(e.id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});setSS('ok');}catch{setSS('error');}}
async function patchEntry(e){try{await fetch(ep(e.id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});setSS('ok');showToast('更新しました ✓');}catch{setSS('error');}}
async function removeEntry(id){try{await fetch(ep(id),{method:'DELETE'});setSS('ok');}catch{setSS('error');}}
let lastLen=0;
async function poll(){try{const r=await fetch(dbPath());const d=await r.json();const ne=d?Object.values(d):[];if(ne.length!==lastLen){entries=ne;lastLen=ne.length;render();}}catch{}}

// Helpers
const mE=()=>entries.filter(e=>e.year===selYear&&e.month===selMonth);
const dE=d=>entries.filter(e=>e.year===selYear&&e.month===selMonth&&e.day===d);
function calcCarry(){const prev=entries.filter(e=>e.year<selYear||(e.year===selYear&&e.month<selMonth));return prev.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0)-prev.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);}

// ─── THEME ───
let autoTimer=null;
function getTimeTheme(){
  const h=new Date().getHours();
  if(h>=5&&h<7)return'sunrise';
  if(h>=7&&h<17)return'day';
  if(h>=17&&h<20)return'sunset';
  return'night';
}
function applyTheme(mode){
  const html=document.documentElement;
  const knob=document.getElementById('theme-knob');
  html.classList.remove('dark','sunset');
  if(mode==='dark'||mode==='night'){html.classList.add('dark');if(knob)knob.textContent='🌙';}
  else if(mode==='sunset'){html.classList.add('sunset');if(knob)knob.textContent='🌇';}
  else if(mode==='sunrise'){if(knob)knob.textContent='🌅';}
  else{if(knob)knob.textContent='☀️';}
}
function toggleTheme(){
  if(localStorage.getItem('kb_auto')==='on'){stopAuto();showToast('AUTOモードをOFFにしました');return;}
  const isDark=document.documentElement.classList.contains('dark');
  const saved=isDark?'light':'dark';
  applyTheme(saved);
  localStorage.setItem('kb_theme',saved);
}
function runAutoTheme(){
  const mode=getTimeTheme();
  applyTheme(mode);
  const labels={sunrise:'🌅 夜明け',day:'☀️ 昼',sunset:'🌇 夕暮れ',night:'🌙 夜'};
  document.getElementById('auto-btn').title=labels[mode]||'';
}
function startAuto(){
  localStorage.setItem('kb_auto','on');
  document.getElementById('auto-btn').classList.add('on');
  document.getElementById('auto-btn').textContent='AUTO ✦';
  runAutoTheme();
  autoTimer=setInterval(runAutoTheme,60000);
  showToast('AUTOモード ON — 時刻でテーマが変わります');
}
function stopAuto(){
  localStorage.setItem('kb_auto','off');
  clearInterval(autoTimer);autoTimer=null;
  document.getElementById('auto-btn').classList.remove('on');
  document.getElementById('auto-btn').textContent='AUTO';
  const saved=localStorage.getItem('kb_theme')||'light';
  applyTheme(saved);
}
function toggleAuto(){
  if(localStorage.getItem('kb_auto')==='on')stopAuto();
  else startAuto();
}

// ─── AI分析 ───
function openAI(){
  const body=document.getElementById('ai-body');
  body.innerHTML=buildAnalysis();
  const overlay=document.getElementById('ai-overlay');
  const panel=document.getElementById('ai-panel');
  requestAnimationFrame(()=>{overlay.classList.add('open');panel.classList.add('open');});
}
function closeAI(){
  document.getElementById('ai-overlay').classList.remove('open');
  document.getElementById('ai-panel').classList.remove('open');
}
function buildAnalysis(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  const me=entries.filter(e=>e.year===y&&e.month===m);
  const prevMe=entries.filter(e=>{
    let pm=m-1,py=y;if(pm<0){pm=11;py--;}
    return e.year===py&&e.month===pm;
  });
  const totalExp=me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const prevExp=prevMe.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const totalInc=me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const carry=calcCarry();
  const bal=totalInc+carry-totalExp;
  const lastDate=new Date(y,m+1,0).getDate();
  const todayDate=now.getDate();
  const daysLeft=lastDate-todayDate;
  const dailyAvg=todayDate>0?Math.round(totalExp/todayDate):0;
  const predicted=totalExp+(dailyAvg*daysLeft);
  const tagMap={};
  me.filter(e=>e.type==='expense').forEach(e=>{
    const k=e.tag||(autoTag(e.content)?.tag)||'その他';
    tagMap[k]=(tagMap[k]||0)+e.amount;
  });
  const topTag=Object.entries(tagMap).sort((a,b)=>b[1]-a[1])[0];
  const diff=prevExp>0?Math.round((totalExp-prevExp)/prevExp*100):null;
  const diffText=diff===null?'先月データなし':diff>0?`先月より ${diff}% 増加 📈`:`先月より ${Math.abs(diff)}% 減少 📉`;
  const diffColor=diff!==null&&diff>10?'color:var(--red)':diff!==null&&diff<-10?'color:var(--green)':'color:var(--text2)';
  const insights=[];
  if(topTag)insights.push(`一番使っているのは「${topTag[0]}」で ¥${fmt(topTag[1])} です。`);
  if(dailyAvg>0)insights.push(`1日平均の出費は ¥${fmt(dailyAvg)} のペースです。`);
  if(daysLeft>0&&dailyAvg>0){
    if(predicted>totalInc+carry)insights.push(`このペースだと月末に ¥${fmt(Math.round(predicted-(totalInc+carry)))} 赤字になる可能性があります ⚠️`);
    else insights.push(`このペースなら月末に ¥${fmt(Math.round(bal-dailyAvg*daysLeft))} 残る見込みです ✨`);
  }
  if(me.length===0)return`<div class="ai-card"><div class="ai-card-label">データ不足</div><div class="ai-card-value" style="font-size:15px">今月の記録がまだありません</div></div>`;
  return`
    <div class="ai-card">
      <div class="ai-card-label">📅 今月の出費</div>
      <div class="ai-card-value">¥${fmt(totalExp)}</div>
      <div class="ai-card-sub" style="${diffColor}">${diffText}</div>
    </div>
    <div class="ai-card">
      <div class="ai-card-label">🏆 最多カテゴリ</div>
      <div class="ai-card-value" style="font-size:18px">${topTag?`${topTag[0]}  ¥${fmt(topTag[1])}`:'記録なし'}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="ai-card">

function fmtTime(iso){
  if(!iso)return'';
  const d=new Date(iso),now=new Date();
  const hm=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  const diffDay=Math.floor((now-d)/86400000);
  if(diffDay===0)return`今日 ${hm}`;if(diffDay===1)return`昨日 ${hm}`;
  if(diffDay<7)return`${diffDay}日前 ${hm}`;
  return`${d.getMonth()+1}/${d.getDate()} ${hm}`;
}

function autoTag(content){
  if(!content)return null;
  const lower=content.toLowerCase();
  for(const rule of TAG_RULES){for(const kw of rule.kw){if(lower.includes(kw.toLowerCase()))return{tag:rule.tag,icon:rule.icon,color:rule.color};}}
  return null;
}

function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function compressImg(file,maxPx){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);c.toBlob(b=>res(b),'image/jpeg',0.9);
    };img.onerror=rej;img.src=url;
  });
}
function parseLines(lines){
  const out=[];
  const skip=/合計|小計|税|割引|値引|ポイント|おつり|お釣|お預|預かり|釣り|total|subtotal|tax|discount|change|tel|電話|レジ|登録|バーコード|barcode|ありがとう|thank|shop|store|\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}|^\s*[-=＝\*\*\*]+\s*$/i;
  for(const line of lines){
    const l=line.trim();if(!l||l.length<2)continue;if(skip.test(l))continue;
    const yenRe=/[¥￥]\s*([0-9][0-9,，]*)/g;const yenMatches=[...l.matchAll(yenRe)];
    let amt=0,matchStr='';
    if(yenMatches.length>0){const last=yenMatches[yenMatches.length-1];amt=parseInt(last[1].replace(/[,，]/g,''));matchStr=last[0];}
    else{const numRe=/\s([0-9][0-9,，]{1,6})\s*$/;const m=l.match(numRe);if(!m)continue;amt=parseInt(m[1].replace(/[,，]/g,''));matchStr=m[0];}
    if(isNaN(amt)||amt<=0||amt>99999)continue;
    let name=l;if(matchStr){const idx=l.lastIndexOf(matchStr);if(idx>0)name=l.slice(0,idx);}
    name=name.replace(/[¥￥\s\|｜\-－…・。、\*]+$/,'').trim();
    if(!name||name.length<1||/^[\d\s\W]+$/.test(name))continue;
    if((name.match(/\d/g)||[]).length>5)continue;
    if(name.length>25)name=name.slice(0,25);
    out.push({name,amount:amt});
  }
  return out;
}
async function handleReceipt(input){
  const file=input.files[0];if(!file)return;input.value='';
  if(receiptImgUrl)URL.revokeObjectURL(receiptImgUrl);
  receiptImgUrl=URL.createObjectURL(file);receiptItems=[];ocrRunning=true;render();
  try{
    const blob=await compressImg(file,1400);
    await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    const result=await Tesseract.recognize(blob,'jpn+eng',{logger:m=>{if(m.status==='recognizing text'){const el=document.getElementById('ocr-pct');if(el)el.textContent=`読み取り中... ${Math.round((m.progress||0)*100)}%`;}}});
    const lines=result.data.text.split('\n');const parsed=parseLines(lines);
    ocrRunning=false;
    if(parsed.length===0){receiptItems=[{name:'',amount:0,checked:true,editing:true}];showToast('自動認識できませんでした。手動で入力してください');}
    else{receiptItems=parsed.map(p=>({...p,checked:true,editing:false}));showToast(`${parsed.length}件認識しました`);}
  }catch(e){ocrRunning=false;receiptItems=[];showToast('読み取りエラー: '+e.message);}
  renderPanel();
}

const PIE_COLORS=['#D4537E','#1D9E75','#F59E0B','#6366F1','#EC4899','#14B8A6','#F97316','#8B5CF6'];
function renderGraph(){
  const el=document.getElementById('page-graph');
  const monthData=MONTHS.map((_,m)=>{const exp=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='expense').reduce((s,e)=>s+e.amount,0);const inc=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='income').reduce((s,e)=>s+e.amount,0);return{exp,inc};});
  const maxVal=Math.max(...monthData.map(d=>Math.max(d.exp,d.inc)),1);
  const barRows=monthData.map((d,i)=>`<div class="bar-row"><div class="bar-label">${i+1}月</div><div style="flex:1;display:flex;flex-direction:column;gap:3px">${d.exp>0?`<div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.exp/maxVal*100)}%;background:var(--pink)"></div></div>`:''} ${d.inc>0?`<div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.inc/maxVal*100)}%;background:var(--green)"></div></div>`:''}</div><div style="font-size:11px;color:var(--text2);text-align:right;min-width:52px">${d.exp>0?`<div style="color:var(--pink)">-¥${fmt(d.exp)}</div>`:''}${d.inc>0?`<div style="color:var(--green)">+¥${fmt(d.inc)}</div>`:''}</div></div>`).join('');
  const mExp=entries.filter(e=>e.year===selYear&&e.month===selMonth&&e.type==='expense');
  const groups={};mExp.forEach(e=>{const k=e.tag||(autoTag(e.content)?.tag)||'その他';groups[k]=(groups[k]||0)+e.amount;});
  const sorted=Object.entries(groups).sort((a,b)=>b[1]-a[1]).slice(0,7);const total=sorted.reduce((s,[,v])=>s+v,0)||1;
  let pieHtml='<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">今月の出費データなし</div>';
  if(sorted.length>0){
    let startAngle=-Math.PI/2;let slices='';
    sorted.forEach(([name,val],i)=>{const ratio=val/total;const endAngle=startAngle+ratio*2*Math.PI;const x1=50+40*Math.cos(startAngle),y1=50+40*Math.sin(startAngle);const x2=50+40*Math.cos(endAngle),y2=50+40*Math.sin(endAngle);const large=ratio>0.5?1:0;slices+=`<path d="M50,50 L${x1},${y1} A40,40 0 ${large},1 ${x2},${y2} Z" fill="${PIE_COLORS[i%PIE_COLORS.length]}" stroke="var(--surface)" stroke-width="1"/>`;startAngle=endAngle;});
    const legend=sorted.map(([name,val],i)=>`<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></div><span style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span><span style="color:var(--text2);font-size:11px">¥${fmt(val)}</span></div>`).join('');
    pieHtml=`<div class="pie-wrap"><svg viewBox="0 0 100 100" width="120" height="120" style="flex-shrink:0"><circle cx="50" cy="50" r="40" fill="var(--surface2)"/>${slices}</svg><div class="pie-legend">${legend}</div></div>`;
  }
  el.innerHTML=`<div class="page-title">${selYear}年 グラフ</div><div class="card"><div class="card-title">月別 入金・出費（棒グラフ）</div><div class="chart-wrap">${barRows}</div><div style="display:flex;gap:12px;margin-top:10px;font-size:11px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--pink);border-radius:2px;display:inline-block"></span>出費</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--green);border-radius:2px;display:inline-block"></span>入金</span></div></div><div class="card"><div class="card-title">${selMonth+1}月の出費内訳（円グラフ）</div>${pieHtml}</div>`;
}

function renderAnnual(){
  const el=document.getElementById('page-annual');
  const totalInc=entries.filter(e=>e.year===selYear&&e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExp=entries.filter(e=>e.year===selYear&&e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const rows=MONTHS.map((_,m)=>{const inc=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='income').reduce((s,e)=>s+e.amount,0);const exp=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='expense').reduce((s,e)=>s+e.amount,0);if(inc===0&&exp===0)return'';const bal=inc-exp;return`<div class="annual-row"><div class="annual-month">${m+1}月</div><div class="annual-vals"><div class="annual-val"><span>入金</span><span style="color:var(--green)">+¥${fmt(inc)}</span></div><div class="annual-val"><span>出費</span><span style="color:var(--pink)">-¥${fmt(exp)}</span></div><div class="annual-val"><span>収支</span><span style="color:${bal>=0?'var(--green)':'var(--red)'}">${bal>=0?'+':''}¥${fmt(bal)}</span></div></div></div>`;}).join('');
  el.innerHTML=`<div class="page-title">${selYear}年 年間まとめ</div><div class="summary-row" style="margin-bottom:14px"><div class="sum-card"><div class="sum-label">年間入金</div><div class="sum-value income">¥${fmt(totalInc)}</div></div><div class="sum-card"><div class="sum-label">年間出費</div><div class="sum-value expense">¥${fmt(totalExp)}</div></div><div class="sum-card"><div class="sum-label">年間収支</div><div class="sum-value ${totalInc-totalExp>=0?'positive':'negative'}">${totalInc-totalExp>=0?'+':''}¥${fmt(totalInc-totalExp)}</div></div></div><div class="card"><div class="card-title">月別内訳</div>${rows||'<div style="text-align:center;padding:20px;font-size:13px;color:var(--text3)">データがありません</div>'}</div>`;
}

function renderRanking(){
  const el=document.getElementById('page-ranking');
  const dayMap={};
  entries.filter(e=>e.type==='expense').forEach(e=>{const key=`${e.year}-${String(e.month+1).padStart(2,'0')}-${String(e.day).padStart(2,'0')}`;if(!dayMap[key])dayMap[key]={year:e.year,month:e.month,day:e.day,total:0,count:0};dayMap[key].total+=e.amount;dayMap[key].count++;});
  const sorted=Object.values(dayMap).sort((a,b)=>b.total-a.total).slice(0,10);
  const medals=['🥇','🥈','🥉'];
  const rows=sorted.length===0?'<div style="text-align:center;padding:20px;font-size:13px;color:var(--text3)">データがありません</div>':sorted.map((d,i)=>`<div class="rank-row"><div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i<3?medals[i]:i+1}</div><div class="rank-date"><div class="rank-date-main">${d.year}年${d.month+1}月${d.day}日</div><div class="rank-date-sub">${d.count}件の出費</div></div><div class="rank-amt">¥${fmt(d.total)}</div></div>`).join('');
  el.innerHTML=`<div class="page-title">出費の多い日 ランキング</div><div class="card"><div class="card-title">全期間 TOP10</div>${rows}</div>`;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
