<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家計簿</title>
<style>
:root{
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#993556;
  --green:#1D9E75;--red:#E24B4A;
  --bg:#FAF8F6;--surface:#FFFFFF;--surface2:#F2EFEC;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#1C1917;--text2:#78716C;--text3:#A8A29E;
  --radius:14px;--rsm:8px;
}
html.dark{
  --pink:#F08AB0;--pink-l:#2D1520;--pink-d:#F5B8CD;
  --green:#3DD68C;--red:#F07070;
  --bg:#0D0D0F;--surface:#17171A;--surface2:#202025;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#ECEAE6;--text2:#8A8480;--text3:#4A4845;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{transition:background .35s,color .35s}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px;overflow-x:hidden;max-width:100vw;transition:background .35s,color .35s}
/* トグルスイッチ */
.theme-toggle{position:relative;display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:999px;padding:3px;cursor:pointer;transition:background .35s,border-color .35s;flex-shrink:0}
.theme-toggle-knob{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .35s cubic-bezier(.34,1.56,.64,1),background .35s;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.15);position:relative;z-index:1}
html.dark .theme-toggle-knob{transform:translateX(28px)}
.theme-toggle-track{position:absolute;left:3px;right:3px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;font-size:12px;padding:0 3px}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 18px 0;position:sticky;top:0;z-index:100;transition:background .35s,border-color .35s}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-left{display:flex;flex-direction:column}
.header-right{display:flex;align-items:center;gap:8px}
.app-title{font-size:18px;font-weight:700}
.app-year{font-size:12px;color:var(--text2)}
.sync-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:#F59E0B;animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px;margin-bottom:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab.active{color:var(--pink);border-bottom-color:var(--pink)}
/* Graph page */
.page{padding:14px 14px 0}
.page-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px}
.chart-wrap{width:100%;overflow:hidden}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--text2);width:26px;flex-shrink:0;text-align:right}
.bar-bg{flex:1;background:var(--surface2);border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{font-size:11px;color:var(--text2);width:60px;flex-shrink:0;text-align:right}
.pie-wrap{display:flex;align-items:center;gap:16px}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.pie-leg-row{display:flex;align-items:center;gap:7px;font-size:12px}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Annual page */
.annual-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.annual-row:last-child{border-bottom:none}
.annual-month{font-size:13px;font-weight:600;color:var(--text)}
.annual-vals{display:flex;gap:14px}
.annual-val{font-size:12px;text-align:right}
.annual-val span{display:block;font-size:10px;color:var(--text3);margin-bottom:1px}
/* Ranking page */
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:18px;font-weight:700;color:var(--text3);width:28px;flex-shrink:0;text-align:center}
.rank-num.gold{color:#F59E0B}
.rank-num.silver{color:#9CA3AF}
.rank-num.bronze{color:#CD7C3A}
.rank-date{flex:1}
.rank-date-main{font-size:13px;font-weight:600;color:var(--text)}
.rank-date-sub{font-size:11px;color:var(--text3);margin-top:2px}
.rank-amt{font-size:14px;font-weight:700;color:var(--pink)}
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:10px 0 12px}
.month-tab{padding:6px 0;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;width:100%}
.month-tab.active{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:600}
.tag-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:3px}
.content{padding:14px 14px 0}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sum-card{background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);padding:11px 8px;text-align:center}
.sum-label{font-size:10px;color:var(--text2);margin-bottom:5px;font-weight:500}
.sum-value{font-size:13px;font-weight:700}
.sum-value.income{color:var(--green)}
.sum-value.expense{color:var(--pink)}
.sum-value.positive{color:var(--green)}
.sum-value.negative{color:var(--red)}
.carry-badge{background:var(--surface);border:1px solid var(--green);border-radius:var(--rsm);padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.calendar{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.cal-title{padding:11px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.cal-dow{text-align:center;padding:7px 0;font-size:11px;color:var(--text2);font-weight:600}
.cal-dow.sun{color:var(--red)}
.cal-dow.sat{color:#378ADD}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:60px;padding:4px 3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.empty{cursor:default;background:var(--surface2);opacity:.4}
.cal-cell.selected{background:var(--pink-l)}
.cal-num{font-size:12px;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.cal-num.sun{color:var(--red)}
.cal-num.sat{color:#378ADD}
.cal-num.today{background:var(--pink);color:#fff}
.cal-exp{font-size:10px;color:var(--pink);line-height:1.4}
.cal-inc{font-size:10px;color:var(--green);line-height:1.4}
.day-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.panel-hd{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--pink-l)}
.panel-title{font-size:15px;font-weight:700;color:var(--pink-d)}
.panel-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:2px 6px}
.add-form{padding:13px 14px;border-bottom:1px solid var(--border)}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:9px}
.type-toggle{display:flex;border-radius:var(--rsm);overflow:hidden;border:1px solid var(--border2);margin-bottom:9px}
.type-btn{flex:1;padding:9px 0;font-size:13px;font-weight:600;border:none;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.type-btn.active.income{background:var(--green);color:#fff}
.type-btn.active.expense{background:var(--pink);color:#fff}
.form-inputs{display:flex;flex-direction:column;gap:8px}
.form-inputs input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--rsm);font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.form-inputs input:focus{border-color:var(--pink)}
.submit-btn{width:100%;padding:11px;background:var(--pink);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;cursor:pointer;margin-top:2px}
.receipt-btn{width:100%;padding:11px;background:var(--surface2);color:var(--text2);border:1px dashed var(--border2);border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.receipt-btn:hover{background:var(--pink-l);border-color:var(--pink);color:var(--pink)}
.receipt-box{padding:12px 14px;border-bottom:1px solid var(--border)}
.receipt-box-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.receipt-img{width:100%;border-radius:8px;max-height:240px;object-fit:contain;background:#000;margin-bottom:10px;display:block}
.r-item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.r-item-row:last-of-type{border-bottom:none}
.r-chk{width:18px;height:18px;accent-color:var(--pink);flex-shrink:0;cursor:pointer}
.r-name{flex:1;font-size:13px;color:var(--text);word-break:break-all}
.r-amt{font-size:13px;font-weight:700;color:var(--pink);flex-shrink:0;white-space:nowrap}
.r-edit-btn,.r-del-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 5px}
.r-edit-btn{color:var(--text2)}
.r-del-btn{color:var(--red)}
.r-edit-row{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.r-edit-row input{padding:6px 8px;border:1px solid var(--pink);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.r-save-btn{padding:6px 12px;background:var(--pink);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.r-add-row{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.r-add-row input{padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.r-add-row input:focus{border-color:var(--pink)}
.r-confirm-btn{width:100%;padding:11px;background:var(--pink);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}
.r-cancel-btn{width:100%;padding:9px;background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rsm);font-size:13px;cursor:pointer;margin-top:6px}
.ocr-progress{font-size:13px;color:var(--text2);padding:12px 0;display:flex;align-items:center;gap:8px}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.entry-list{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.entry-empty{text-align:center;padding:18px;font-size:13px;color:var(--text3)}
.entry-item{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--surface2);border-radius:var(--rsm)}
.entry-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}
.entry-bar.income{background:var(--green)}
.entry-bar.expense{background:var(--pink)}
.entry-body{flex:1;min-width:0}
.entry-content{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-type{font-size:11px;color:var(--text3);margin-top:2px}
.entry-amount{font-size:14px;font-weight:700;flex-shrink:0}
.entry-amount.income{color:var(--green)}
.entry-amount.expense{color:var(--pink)}
.entry-btns{display:flex;gap:2px;flex-shrink:0}
.entry-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:6px;font-size:13px;color:var(--text2)}
.entry-btn.del:hover{color:var(--red)}
.edit-inline{padding:10px 12px;background:var(--pink-l);border-radius:var(--rsm);display:flex;flex-direction:column;gap:7px;margin:0 10px 6px}
.edit-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border2)}
.edit-tb{flex:1;padding:7px 0;font-size:12px;font-weight:600;border:none;background:var(--surface);color:var(--text2);cursor:pointer}
.edit-tb.active.income{background:var(--green);color:#fff}
.edit-tb.active.expense{background:var(--pink);color:#fff}
.edit-inputs{display:flex;gap:7px}
.edit-inputs input{flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.edit-actions{display:flex;gap:7px}
.edit-save{flex:1;padding:8px;background:var(--pink);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.edit-cancel{padding:8px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <div class="header-left">
      <div class="app-title">家計簿</div>
      <div class="app-year" id="year-label"></div>
    </div>
    <div class="header-right">
      <div class="sync-btn"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">同期中</span></div>
      <div class="theme-toggle" onclick="toggleTheme()" title="テーマ切替">
        <div class="theme-toggle-track"><span>☀️</span><span>🌙</span></div>
        <div class="theme-toggle-knob" id="theme-knob">☀️</div>
      </div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('main')">📅 家計簿</button>
    <button class="nav-tab" onclick="switchPage('graph')">📊 グラフ</button>
    <button class="nav-tab" onclick="switchPage('annual')">📆 年間</button>
    <button class="nav-tab" onclick="switchPage('ranking')">🏆 ランキング</button>
  </div>
  <div class="month-grid" id="month-tabs"></div>
</div>
<div id="page-main" class="content">
  <div class="summary-row">
    <div class="sum-card"><div class="sum-label">入金合計</div><div class="sum-value income" id="sum-inc">¥0</div></div>
    <div class="sum-card"><div class="sum-label">出費合計</div><div class="sum-value expense" id="sum-exp">¥0</div></div>
    <div class="sum-card"><div class="sum-label">残高</div><div class="sum-value" id="sum-bal">¥0</div></div>
  </div>
  <div id="carry-wrap"></div>
  <div class="calendar" id="cal"></div>
  <div id="day-panel"></div>
</div>
<div id="page-graph" class="page" style="display:none"></div>
<div id="page-annual" class="page" style="display:none"></div>
<div id="page-ranking" class="page" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const DB_URL='https://kanekannri-default-rtdb.asia-southeast1.firebasedatabase.app';
const ROOM_ID='a';
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOWS=['日','月','火','水','木','金','土'];
let entries=[],selMonth=new Date().getMonth(),selYear=new Date().getFullYear(),selDay=null,editId=null,formType='expense';
let receiptItems=[],receiptImgUrl='',ocrRunning=false;
const fmt=n=>Math.round(n).toLocaleString('ja-JP');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

// Firebase
const dbPath=()=>`${DB_URL}/rooms/${ROOM_ID}/entries.json`;
const ep=id=>`${DB_URL}/rooms/${ROOM_ID}/entries/${id}.json`;
function setSS(s){document.getElementById('sync-dot').className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('sync-label').textContent=s==='syncing'?'同期中':s==='error'?'エラー':'同期済み';}
async function fetchEntries(){setSS('syncing');try{const r=await fetch(dbPath());const d=await r.json();entries=d?Object.values(d):[];setSS('ok');}catch{setSS('error');}}
async function pushEntry(e){try{await fetch(ep(e.id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});setSS('ok');}catch{setSS('error');}}
async function patchEntry(e){try{await fetch(ep(e.id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});setSS('ok');showToast('更新しました ✓');}catch{setSS('error');}}
async function removeEntry(id){try{await fetch(ep(id),{method:'DELETE'});setSS('ok');}catch{setSS('error');}}
let lastLen=0;
async function poll(){try{const r=await fetch(dbPath());const d=await r.json();const ne=d?Object.values(d):[];if(ne.length!==lastLen){entries=ne;lastLen=ne.length;render();}}catch{}}

// Helpers
const mE=()=>entries.filter(e=>e.year===selYear&&e.month===selMonth);
const dE=d=>entries.filter(e=>e.year===selYear&&e.month===selMonth&&e.day===d);
function calcCarry(){const prev=entries.filter(e=>e.year<selYear||(e.year===selYear&&e.month<selMonth));return prev.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0)-prev.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);}

// ─── THEME ───
function applyTheme(dark){
  const knob=document.getElementById('theme-knob');
  if(dark){
    document.documentElement.classList.add('dark');
    if(knob)knob.textContent='🌙';
  }else{
    document.documentElement.classList.remove('dark');
    if(knob)knob.textContent='☀️';
  }
}
function toggleTheme(){
  const isDark=document.documentElement.classList.contains('dark');
  applyTheme(!isDark);
  localStorage.setItem('kb_theme',!isDark?'dark':'light');
}

window.addEventListener('load',async()=>{
  // テーマ復元
  const saved=localStorage.getItem('kb_theme');
  const preferDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyTheme(saved==='dark'||(saved===null&&preferDark));

  document.getElementById('year-label').textContent=selYear+'年';
  await fetchEntries();lastLen=entries.length;render();
  setInterval(poll,5000);
});

function render(){renderTabs();renderSummary();renderCal();renderPanel();}
function renderTabs(){const c=document.getElementById('month-tabs');c.innerHTML=MONTHS.map((m,i)=>`<button class="month-tab${i===selMonth?' active':''}" onclick="changeMonth(${i})">${m}</button>`).join('');}
function changeMonth(m){selMonth=m;selDay=null;editId=null;receiptItems=[];if(receiptImgUrl){URL.revokeObjectURL(receiptImgUrl);receiptImgUrl='';}render();}
function renderSummary(){
  const me=mE();
  const inc=me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp=me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const carry=calcCarry();const bal=inc+carry-exp;
  document.getElementById('sum-inc').textContent='¥'+fmt(inc);
  document.getElementById('sum-exp').textContent='¥'+fmt(exp);
  const be=document.getElementById('sum-bal');be.textContent='¥'+fmt(bal);be.className='sum-value '+(bal>=0?'positive':'negative');
  document.getElementById('carry-wrap').innerHTML=carry!==0?`<div class="carry-badge">↩ 前月繰越 ${carry>=0?'+':''}¥${fmt(carry)}</div>`:'';
}
function renderCal(){
  const today=new Date();const isCur=today.getFullYear()===selYear&&today.getMonth()===selMonth;
  const first=new Date(selYear,selMonth,1).getDay();const last=new Date(selYear,selMonth+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=last;d++){
    const dow=(first+d-1)%7;const isT=isCur&&today.getDate()===d;const isSel=selDay===d;

  {tag:'お昼',icon:'🍱',color:'#F59E0B',kw:['お昼','ランチ','昼食','昼ごはん','ひるごはん','ランチ代']},
  {tag:'夕飯',icon:'🍽️',color:'#EF4444',kw:['夕飯','夕食','晩ごはん','ディナー','夜ごはん','夕ご飯','晩飯']},
  {tag:'デザート',icon:'🍰',color:'#EC4899',kw:['デザート','スイーツ','ケーキ','アイス','パフェ','プリン','チョコ','和菓子','クレープ','タピオカ']},
  {tag:'カフェ',icon:'☕',color:'#92400E',kw:['カフェ','コーヒー','スタバ','スターバックス','ドトール','タリーズ','珈琲','喫茶']},
  {tag:'外食',icon:'🍜',color:'#F97316',kw:['外食','ご飯','定食','ラーメン','寿司','焼肉','居酒屋','ファミレス','マック','吉野家','すき家','ガスト','ファスト','うどん','そば','パスタ']},
  {tag:'スーパー',icon:'🛒',color:'#10B981',kw:['スーパー','イオン','ドンキ','ドン・キホーテ','業務スーパー','食料品','食材','西友','ライフ','マルエツ']},
  {tag:'日用品',icon:'🧴',color:'#64748B',kw:['ドラッグ','マツキヨ','ウエルシア','日用品','シャンプー','洗剤','トイレ','消耗品']},
  {tag:'交通',icon:'🚃',color:'#6366F1',kw:['電車','バス','タクシー','交通費','新幹線','地下鉄','suica','ic','定期']},
  {tag:'デート',icon:'💕',color:'#D4537E',kw:['デート','水族館','遊園地','動物園','テーマパーク','ディズニー','ユニバ','観光']},
  {tag:'朝食',icon:'🌅',color:'#FCD34D',kw:['朝食','朝ごはん','モーニング','朝飯']},
];
function autoTag(content){
  if(!content)return null;
  const lower=content.toLowerCase();
  for(const rule of TAG_RULES){
    for(const kw of rule.kw){
      if(lower.includes(kw.toLowerCase()))return{tag:rule.tag,icon:rule.icon,color:rule.color};
    }
  }
  return null;
}

// Receipt OCR
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

async function compressImg(file,maxPx){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);c.toBlob(b=>res(b),'image/jpeg',0.9);
    };img.onerror=rej;img.src=url;
  });
}

function parseLines(lines){
  const out=[];
  // 除外ワード（合計・電話・レジ・日付など）
  const skip=/合計|小計|税|割引|値引|ポイント|おつり|お釣|お預|預かり|釣り|total|subtotal|tax|discount|change|tel|電話|レジ|登録|バーコード|barcode|ありがとう|thank|shop|store|\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}|^\s*[-=＝\*\*\*]+\s*$/i;

  for(const line of lines){
    const l=line.trim();
    if(!l||l.length<2)continue;
    if(skip.test(l))continue;

    // ¥マーク付きの価格を優先して探す
    const yenRe=/[¥￥]\s*([0-9][0-9,，]*)/g;
    const yenMatches=[...l.matchAll(yenRe)];

    let amt=0, matchStr='';
    if(yenMatches.length>0){
      // 最後の¥価格を使う（右端に価格があることが多い）
      const last=yenMatches[yenMatches.length-1];
      amt=parseInt(last[1].replace(/[,，]/g,''));
      matchStr=last[0];
    } else {
      // ¥なしの場合：行末の数字を価格として扱う
      const numRe=/\s([0-9][0-9,，]{1,6})\s*$/;
      const m=l.match(numRe);
      if(!m)continue;
      amt=parseInt(m[1].replace(/[,，]/g,''));
      matchStr=m[0];
    }

    // 価格の妥当性チェック（1円〜99999円）
    if(isNaN(amt)||amt<=0||amt>99999)continue;

    // 品目名：価格部分を除いた残り
    let name=l;
    if(matchStr){
      const idx=l.lastIndexOf(matchStr);
      if(idx>0)name=l.slice(0,idx);
    }
    // 記号・空白・数字だけの行はスキップ
    name=name.replace(/[¥￥\s\|｜\-－…・。、\*]+$/,'').trim();
    // 数字や記号だけになった場合はスキップ
    if(!name||name.length<1||/^[\d\s\W]+$/.test(name))continue;
    // 電話番号っぽい（数字が多い）はスキップ
    if((name.match(/\d/g)||[]).length>5)continue;
    if(name.length>25)name=name.slice(0,25);

    out.push({name,amount:amt});
  }
  return out;
}

async function handleReceipt(input){
  const file=input.files[0];if(!file)return;input.value='';
  if(receiptImgUrl)URL.revokeObjectURL(receiptImgUrl);
  receiptImgUrl=URL.createObjectURL(file);
  receiptItems=[];ocrRunning=true;render();

  try{
    const blob=await compressImg(file,1400);
    await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    const result=await Tesseract.recognize(blob,'jpn+eng',{
      logger:m=>{
        if(m.status==='recognizing text'){
          const el=document.getElementById('ocr-pct');
          if(el)el.textContent=`読み取り中... ${Math.round((m.progress||0)*100)}%`;
        }
      }
    });
    const lines=result.data.text.split('\n');
    const parsed=parseLines(lines);
    ocrRunning=false;
    if(parsed.length===0){
      // 品目が取れなかったら手入力用に空行1つ
      receiptItems=[{name:'',amount:0,checked:true,editing:true}];
      showToast('自動認識できませんでした。手動で入力してください');
    } else {
      receiptItems=parsed.map(p=>({...p,checked:true,editing:false}));
      showToast(`${parsed.length}件認識しました`);
    }
  }catch(e){
    ocrRunning=false;receiptItems=[];
    showToast('読み取りエラー: '+e.message);
  }
  render();
}

// ─── GRAPH PAGE ───
const PIE_COLORS=['#D4537E','#1D9E75','#F59E0B','#6366F1','#EC4899','#14B8A6','#F97316','#8B5CF6'];
function renderGraph(){
  const el=document.getElementById('page-graph');
  // 月別出費棒グラフ（今年）
  const monthData=MONTHS.map((_,m)=>{
    const exp=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const inc=entries.filter(e=>e.year===selYear&&e.month===m&&e.type==='income').reduce((s,e)=>s+e.amount,0);
    return{exp,inc};
  });
  const maxVal=Math.max(...monthData.map(d=>Math.max(d.exp,d.inc)),1);

  const barRows=monthData.map((d,i)=>`
    <div class="bar-row">
      <div class="bar-label">${i+1}月</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:3px">
        ${d.exp>0?`<div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.exp/maxVal*100)}%;background:var(--pink)"></div></div>`:''}
        ${d.inc>0?`<div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.inc/maxVal*100)}%;background:var(--green)"></div></div>`:''}
      </div>
      <div style="font-size:11px;color:var(--text2);text-align:right;min-width:52px">
        ${d.exp>0?`<div style="color:var(--pink)">-¥${fmt(d.exp)}</div>`:''}
        ${d.inc>0?`<div style="color:var(--green)">+¥${fmt(d.inc)}</div>`:''}
      </div>
    </div>`).join('');

  // 今月の出費円グラフ（タグ別）
  const mExp=entries.filter(e=>e.year===selYear&&e.month===selMonth&&e.type==='expense');
  const groups={};
  mExp.forEach(e=>{
    const k=e.tag||(autoTag(e.content)?.tag)||'その他';
    groups[k]=(groups[k]||0)+e.amount;
  });
  const sorted=Object.entries(groups).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const total=sorted.reduce((s,[,v])=>s+v,0)||1;
  let pieHtml='<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">今月の出費データなし</div>';
  if(sorted.length>0){
    let startAngle=-Math.PI/2;
    let slices='';
    sorted.forEach(([name,val],i)=>{
      const ratio=val/total;
      const endAngle=startAngle+ratio*2*Math.PI;
      const x1=50+40*Math.cos(startAngle),y1=50+40*Math.sin(startAngle);
      const x2=50+40*Math.cos(endAngle),y2=50+40*Math.sin(endAngle);
      const large=ratio>0.5?1:0;
      slices+=`<path d="M50,50 L${x1},${y1} A40,40 0 ${large},1 ${x2},${y2} Z" fill="${PIE_COLORS[i%PIE_COLORS.length]}" stroke="var(--surface)" stroke-width="1"/>`;
      startAngle=endAngle;
    });
    const legend=sorted.map(([name,val],i)=>`<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></div><span style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span><span style="color:var(--text2);font-size:11px">¥${fmt(val)}</span></div>`).join('');
    pieHtml=`<div class="pie-wrap"><svg viewBox="0 0 100 100" width="120" height="120" style="flex-shrink:0"><circle cx="50" cy="50" r="40" fill="var(--surface2)"/>${slices}</svg><div class="pie-legend">${legend}</div></div>`;
  }

  el.innerHTML=`
    <div class="page-title">${selYear}年 グラフ</div>
    <div class="card">
      <div class="card-title">月別 入金・出費（棒グラフ）</div>
      <div class="chart-wrap">${barRows}</div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:11px">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--pink);border-radius:2px;display:inline-block"></span>出費</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--green);border-radius:2px;display:inline-block"></span>入金</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${selMonth+1}月の出費内訳（円グラフ）</div>
      ${pieHtml}
    </div>`;
}

    <div class="page-title">${selYear}年 年間まとめ</div>
    <div class="summary-row" style="margin-bottom:14px">
      <div class="sum-card"><div class="sum-label">年間入金</div><div class="sum-value income">¥${fmt(totalInc)}</div></div>
      <div class="sum-card"><div class="sum-label">年間出費</div><div class="sum-value expense">¥${fmt(totalExp)}</div></div>
      <div class="sum-card"><div class="sum-label">年間収支</div><div class="sum-value ${totalInc-totalExp>=0?'positive':'negative'}">${totalInc-totalExp>=0?'+':''}¥${fmt(totalInc-totalExp)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">月別内訳</div>
      ${rows||'<div style="text-align:center;padding:20px;font-size:13px;color:var(--text3)">データがありません</div>'}
    </div>`;
}

// ─── RANKING PAGE ───
function renderRanking(){
  const el=document.getElementById('page-ranking');
  // 日別に出費を集計
  const dayMap={};
  entries.filter(e=>e.type==='expense').forEach(e=>{
    const key=`${e.year}-${String(e.month+1).padStart(2,'0')}-${String(e.day).padStart(2,'0')}`;
    if(!dayMap[key])dayMap[key]={year:e.year,month:e.month,day:e.day,total:0,count:0};
    dayMap[key].total+=e.amount;
    dayMap[key].count++;
  });
  const sorted=Object.values(dayMap).sort((a,b)=>b.total-a.total).slice(0,10);
  const medals=['🥇','🥈','🥉'];
  const rows=sorted.length===0
    ?'<div style="text-align:center;padding:20px;font-size:13px;color:var(--text3)">データがありません</div>'
    :sorted.map((d,i)=>`<div class="rank-row">
      <div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i<3?medals[i]:i+1}</div>
      <div class="rank-date">
        <div class="rank-date-main">${d.year}年${d.month+1}月${d.day}日</div>
        <div class="rank-date-sub">${d.count}件の出費</div>
      </div>
      <div class="rank-amt">¥${fmt(d.total)}</div>
    </div>`).join('');

  el.innerHTML=`
    <div class="page-title">出費の多い日 ランキング</div>
    <div class="card">
      <div class="card-title">全期間 TOP10</div>
      ${rows}
    </div>`;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
